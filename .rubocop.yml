---
AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  SuggestExtensions: false
  DisplayCopNames: true
  Exclude:
    - 'bin/**/*'
    - 'assets/**/*'
    - 'vendor/**/*'
    - 'j/**/*'
plugins:
  - rubocop-rake
  - rubocop-minitest
  - rubocop-performance
  - rubocop-elegant
